name: Android Build

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Show Flutter version
        run: flutter --version

      # shorebird.yaml is declared as an asset in pubspec.yaml but is git-ignored.
      # Create a placeholder so the build doesn't fail on missing asset.
      - name: Create placeholder shorebird.yaml
        run: |
          if [ ! -f shorebird.yaml ]; then
            echo "app_id: ci-placeholder" > shorebird.yaml
          fi

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Test
        run: flutter test

      - name: Build debug APK
        run: flutter build apk --debug

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: clipkid-debug-apk
          path: build/app/outputs/flutter-apk/app-debug.apk
          if-no-files-found: error
